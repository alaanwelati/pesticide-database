<script>
    const input = document.getElementById('searchInput');
    const button = document.getElementById('searchButton');
    const resultsEl = document.getElementById('results');
    const resultCount = document.getElementById('resultCount');
    const queryLabel = document.getElementById('queryLabel');

    // ── AUTOCOMPLETE ──
    const searchWrap = input.parentElement;
    searchWrap.style.position = 'relative';

    const suggestBox = document.createElement('div');
    suggestBox.id = 'suggestBox';
    suggestBox.style.cssText = `
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 12px 30px rgba(17,24,39,.12); overflow: hidden;
      z-index: 50; display: none; max-height: 320px; overflow-y: auto;
    `;
    searchWrap.appendChild(suggestBox);

    let debounceTimer = null;
    let activeIndex = -1;
    let currentSuggestions = [];

    function hideSuggestions() {
      suggestBox.style.display = 'none';
      suggestBox.innerHTML = '';
      activeIndex = -1;
      currentSuggestions = [];
    }

    function renderSuggestions(items) {
      currentSuggestions = items;
      activeIndex = -1;
      if (!items.length) { hideSuggestions(); return; }
      suggestBox.innerHTML = items.map((item, i) => `
        <div class="suggest-item" data-index="${i}" style="
          padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
          display: flex; justify-content: space-between; align-items: center; gap: 10px;
        ">
          <span style="font-weight:600;color:var(--text)">${item.name}</span>
          <span style="font-size:0.78rem;color:var(--muted)">${item.type || ''}</span>
        </div>
      `).join('');
      suggestBox.style.display = 'block';

      suggestBox.querySelectorAll('.suggest-item').forEach(el => {
        el.addEventListener('mouseenter', () => {
          setActive(parseInt(el.dataset.index));
        });
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          selectSuggestion(parseInt(el.dataset.index));
        });
      });
    }

    function setActive(idx) {
      activeIndex = idx;
      suggestBox.querySelectorAll('.suggest-item').forEach((el, i) => {
        el.style.background = i === idx ? 'var(--surface2)' : '#fff';
      });
    }

    function selectSuggestion(idx) {
      const item = currentSuggestions[idx];
      if (!item) return;
      hideSuggestions();
      input.value = item.name;
      history.replaceState(null, '', `?search=${encodeURIComponent(item.name)}`);
      loadSearch(item.name);
    }

    async function fetchSuggestions(query) {
      try {
        const r = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        if (!r.ok) { hideSuggestions(); return; }
        const data = await r.json();
        renderSuggestions((data.pesticides || []).slice(0, 8));
      } catch {
        hideSuggestions();
      }
    }

    input.addEventListener('input', () => {
      const value = input.value.trim();
      clearTimeout(debounceTimer);
      if (!value) { hideSuggestions(); return; }
      debounceTimer = setTimeout(() => fetchSuggestions(value), 250);
    });

    input.addEventListener('keydown', e => {
      if (suggestBox.style.display === 'none') {
        if (e.key === 'Enter') button.click();
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive(Math.min(activeIndex + 1, currentSuggestions.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive(Math.max(activeIndex - 1, 0));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0) selectSuggestion(activeIndex);
        else { hideSuggestions(); button.click(); }
      } else if (e.key === 'Escape') {
        hideSuggestions();
      }
    });

    document.addEventListener('click', e => {
      if (!searchWrap.contains(e.target)) hideSuggestions();
    });

    // ── EXISTING SEARCH LOGIC ──
    function setMessage(icon, title, msg) {
      resultsEl.innerHTML = `
        <div class="empty-state">
          <div class="icon">${icon}</div>
          <p><strong>${title}</strong></p>
          ${msg ? `<p style="margin-top:8px;font-size:0.88rem">${msg}</p>` : ''}
        </div>`;
      resultCount.textContent = '0';
    }

    function renderResults(items) {
      if (!items || items.length === 0) {
        setMessage('🔍', 'Sonuç bulunamadı', 'Farklı bir arama terimi deneyin.');
        return;
      }
      resultCount.textContent = items.length;
      resultsEl.innerHTML = items.map(item => {
        const hastaliklar = item.hastaliklar ? item.hastaliklar.split(',').map(h => `<span class="tag disease">${h.trim()}</span>`).join('') : '<span class="tag">Bilgi yok</span>';
        const mekanizmalar = item.mekanizmalar ? item.mekanizmalar.split('.').filter(m => m.trim()).slice(0,4).map(m => `<span class="tag mechanism">${m.trim()}</span>`).join('') : '<span class="tag">Bilgi yok</span>';
        const kullanim = item.kullanim_alanlari ? item.kullanim_alanlari.split(',').map(u => `<span class="tag usage">${u.trim()}</span>`).join('') : '<span class="tag">Bilgi yok</span>';

        return `
        <div class="result-card">
          <div class="card-header">
            <div>
              <div class="result-title">${item.name}</div>
              ${item.molekuler_formul ? `<div class="result-formula">${item.molekuler_formul} ${item.kimyasal_grup ? '· ' + item.kimyasal_grup : ''}</div>` : ''}
            </div>
            <span class="type-badge">${item.type || '—'}</span>
          </div>
          <div class="card-body">
            ${item.genel_bilgi ? `
            <div class="info-section">
              <h4>Genel Bilgi</h4>
              <p>${item.genel_bilgi}</p>
            </div>` : ''}
            <div class="card-grid">
              <div class="info-section">
                <h4>🎯 Hedef Hastalıklar</h4>
                <div class="tags">${hastaliklar}</div>
              </div>
              <div class="info-section">
                <h4>⚗️ Etki Mekanizması</h4>
                <div class="tags">${mekanizmalar}</div>
              </div>
              <div class="info-section">
                <h4>🌱 Kullanım Alanları</h4>
                <div class="tags">${kullanim}</div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    async function loadSearch(query) {
      hideSuggestions();
      const trimmed = query.trim();
      if (!trimmed) {
        queryLabel.textContent = '-';
        setMessage('🌿', 'Arama yapın', 'Üstteki alandan pestisit arayabilirsiniz.');
        return;
      }
      queryLabel.textContent = trimmed;
      resultsEl.innerHTML = `<div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>`;

      try {
        const r = await fetch(`/api/search?q=${encodeURIComponent(trimmed)}`);
        if (!r.ok) { setMessage('❌', 'Hata', 'Arama sırasında hata oluştu.'); return; }
        const data = await r.json();
        const items = data.pesticides || [];

        if (items.length === 0) {
          setMessage('🔍', 'Sonuç bulunamadı', 'Farklı bir arama terimi deneyin.');
          resultCount.textContent = '0';
          return;
        }

        const detailed = await Promise.all(items.map(async item => {
          try {
            const dr = await fetch(`/api/pesticides/${item.id}`);
            if (!dr.ok) return item;
            const dd = await dr.json();
            return {
              ...item,
              genel_bilgi: dd.pesticide?.genel_bilgi || item.genel_bilgi,
              molekuler_formul: dd.pesticide?.molekuler_formul || item.molekuler_formul,
              kimyasal_grup: dd.pesticide?.kimyasal_grup || item.kimyasal_grup,
              hastaliklar: dd.hastaliklar?.join(', ') || '',
              mekanizmalar: dd.mekanizmalar?.join('. ') || '',
              kullanim_alanlari: dd.kullanim_alanlari?.join(', ') || ''
            };
          } catch { return item; }
        }));

        renderResults(detailed);
      } catch(e) {
        setMessage('❌', 'Hata', 'Sunucuya bağlanılamadı.');
      }
    }

    button.addEventListener('click', () => {
      const value = input.value;
      if (value.trim()) {
        hideSuggestions();
        history.replaceState(null, '', `?search=${encodeURIComponent(value.trim())}`);
        loadSearch(value);
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const q = params.get('search') || '';
      if (q) {
        input.value = q;
        loadSearch(q);
      } else {
        setMessage('🌿', 'Arama yapın', 'Üstteki alandan pestisit arayabilirsiniz.');
      }
    });
  </script>
